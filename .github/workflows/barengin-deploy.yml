name: Barengin Deploy to Hostinger

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.PORT }}" -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Upload project to server (rsync)
        shell: bash
        run: |
          rsync -az --delete \
            --filter='P .env' \
            --filter='P storage/***' \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude "node_modules/" \
            -e "ssh -p ${{ secrets.PORT }}" \
            ./ "${{ secrets.USER }}@${{ secrets.HOST }}:${{ secrets.APP_DIR }}/"

      - name: Composer + Artisan (server)
        shell: bash
        run: |
          ssh -p "${{ secrets.PORT }}" "${{ secrets.USER }}@${{ secrets.HOST }}" << EOF
            set -e
            cd "${{ secrets.APP_DIR }}"

            ls -la .env

            composer install --prefer-dist --optimize-autoloader

            # Recreate storage symlink (Hostinger often disables PHP exec(), so don't use artisan storage:link)
            rm -rf public/storage
            ln -s ${{ secrets.APP_DIR }}/storage/app/public ${{ secrets.APP_DIR }}/public/storage

            "${{ secrets.PHP_BIN }}" artisan migrate:fresh --seed
            "${{ secrets.PHP_BIN }}" artisan config:cache || true
            "${{ secrets.PHP_BIN }}" artisan route:cache || true
            "${{ secrets.PHP_BIN }}" artisan view:cache || true
          EOF   
